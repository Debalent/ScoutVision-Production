name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Static Export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Remove server-only files
        working-directory: apps/web
        run: |
          rm -rf app/api
          rm -f middleware.ts
          rm -f app/sitemap.ts
          rm -f app/robots.ts

      - name: Build static export
        working-directory: apps/web
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_APP_URL: https://debalent.github.io/ScoutVision-Production
        run: npx next build

      - name: Add .nojekyll
        run: touch apps/web/out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
