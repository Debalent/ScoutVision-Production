name: ScoutVision CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # Lint & Type Check
  # ============================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/api/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint web
        working-directory: apps/web
        run: npm run lint

      - name: Type check web
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Type check API
        working-directory: apps/api
        run: npx tsc --noEmit

  # ============================================================
  # Unit Tests - AI Package
  # ============================================================
  test-ai:
    name: Test AI Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: packages/ai
        run: npm ci

      - name: Run tests
        working-directory: packages/ai
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ai-coverage
          path: packages/ai/coverage/
          retention-days: 7

  # ============================================================
  # Unit Tests - Web App
  # ============================================================
  test-web:
    name: Test Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run tests
        working-directory: apps/web
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 7

  # ============================================================
  # Build
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-ai, test-web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next/
          retention-days: 3

  # ============================================================
  # Python Training Tests
  # ============================================================
  test-training:
    name: Test Training Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: packages/ai-training/requirements.txt

      - name: Install dependencies
        working-directory: packages/ai-training
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run training tests
        working-directory: packages/ai-training
        run: |
          python -m pytest tests/ -v --tb=short || echo "No tests found yet"

  # ============================================================
  # Prisma Schema Validation
  # ============================================================
  validate-schema:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Prisma
        run: npm install -g prisma

      - name: Validate schema
        working-directory: prisma
        run: npx prisma validate

      - name: Generate Prisma client (dry run)
        run: npx prisma generate

  # ============================================================
  # Security Scan
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit web dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high || true

      - name: Audit API dependencies
        working-directory: apps/api
        run: npm audit --audit-level=high || true

      - name: Check for secrets
        run: |
          echo "Checking for potential secrets in codebase..."
          ! grep -rn "sk-[a-zA-Z0-9]" --include="*.ts" --include="*.tsx" --include="*.js" apps/ packages/ || true
          ! grep -rn "AKIA[A-Z0-9]" --include="*.ts" --include="*.tsx" --include="*.js" apps/ packages/ || true

  # ============================================================
  # Docker Build (GPU inference server)
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build GPU inference image
        uses: docker/build-push-action@v5
        with:
          context: packages/ai
          file: packages/ai/Dockerfile.gpu
          push: false
          tags: scoutvision/inference:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build training image
        uses: docker/build-push-action@v5
        with:
          context: packages/ai-training
          file: packages/ai-training/Dockerfile
          push: false
          tags: scoutvision/training:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy to Preview (PRs)
  # ============================================================
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

  # ============================================================
  # Deploy to Production (main branch)
  # ============================================================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Notify deployment
        if: success()
        run: echo "Production deployment successful"
