# ═══════════════════════════════════════════════════════════════════════════
# ScoutVision AI Training — Configuration
# Master config for all training jobs
# ═══════════════════════════════════════════════════════════════════════════

# ── Detection Model (YOLOv8) ────────────────────────────────────────────
detection:
  model: yolov8x
  pretrained: true
  input_size: 1280
  classes:
    - player
    - referee
    - ball
    - goalkeeper
  batch_size: 16
  epochs: 100
  optimizer:
    type: AdamW
    lr: 0.001
    weight_decay: 0.0005
  scheduler:
    type: cosine
    warmup_epochs: 3
    min_lr: 0.00001
  augmentation:
    mosaic: 0.5
    mixup: 0.15
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    flipud: 0.0
    fliplr: 0.5
    scale: 0.5
    translate: 0.1
  eval:
    iou_threshold: 0.5
    conf_threshold: 0.25
    nms_threshold: 0.45

# ── Tracking Re-ID Model ────────────────────────────────────────────────
tracking_reid:
  backbone: resnet50
  embedding_dim: 128
  input_size: [128, 256]
  batch_size: 64
  epochs: 60
  triplet_margin: 0.3
  optimizer:
    type: Adam
    lr: 0.0003
  augmentation:
    random_erasing: 0.5
    color_jitter: 0.3
    horizontal_flip: 0.5

# ── Pose Estimation (HRNet-W48) ─────────────────────────────────────────
pose:
  model: hrnet_w48
  pretrained: coco
  input_size: [256, 192]
  heatmap_size: [64, 48]
  num_keypoints: 17
  batch_size: 32
  epochs: 140
  optimizer:
    type: Adam
    lr: 0.001
  scheduler:
    type: step
    step_size: 90
    gamma: 0.1
  loss:
    type: mse
  augmentation:
    rotation: 40
    scale: [0.7, 1.3]
    flip: true
    half_body: 0.3
  eval:
    oks_sigmas: [0.026, 0.025, 0.025, 0.035, 0.035, 0.079, 0.079,
                 0.072, 0.072, 0.062, 0.062, 0.107, 0.107, 0.087,
                 0.087, 0.089, 0.089]

# ── Play Classification ─────────────────────────────────────────────────
play_classification:
  architecture: temporal_transformer
  sequence_length: 64
  feature_dim: 256
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  sports:
    football:
      classes: [pass_play, run_play, screen, play_action, RPO, scramble, punt, field_goal]
    basketball:
      classes: [pick_and_roll, isolation, fast_break, post_up, off_ball_screen, transition]
    soccer:
      classes: [corner_kick, free_kick, counter_attack, build_up, set_piece, throw_in]
  batch_size: 32
  epochs: 80
  optimizer:
    type: AdamW
    lr: 0.0001
    weight_decay: 0.01

# ── Highlight Detection ─────────────────────────────────────────────────
highlight:
  architecture: video_transformer
  clip_length: 32
  stride: 8
  feature_dim: 512
  batch_size: 8
  epochs: 50
  classes:
    - touchdown
    - interception
    - sack
    - big_play
    - three_pointer
    - dunk
    - block
    - goal
    - save
    - home_run
    - strikeout
  optimizer:
    type: AdamW
    lr: 0.0001

# ── Data Configuration ──────────────────────────────────────────────────
data:
  root_dir: ./data
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 8
  pin_memory: true
  sports:
    - football
    - basketball
    - soccer
    - baseball
    - track

# ── Hardware ─────────────────────────────────────────────────────────────
hardware:
  gpus: [0]
  amp: true
  compile: true
  distributed: false
  gradient_accumulation: 1
  gradient_checkpointing: false

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  project: scoutvision-training
  backend: wandb
  log_interval: 50
  save_interval: 5
  checkpoint_dir: ./checkpoints
  export_dir: ./exports
  export_formats:
    - onnx
    - torchscript
